<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国传统颜色 · 色卡全览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f2ee;
            font-family: 'Segoe UI', 'PingFang SC', Roboto, 'Helvetica Neue', sans-serif;
            padding: 2rem 1.5rem;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            color: #2c2c2c;
            border-bottom: 2px solid #d9d0c5;
            padding-bottom: 0.4rem;
            margin-bottom: 2rem;
            display: flex;
            align-items: baseline;
            gap: 1rem;
            flex-wrap: wrap;
        }
        h1 small {
            font-size: 1rem;
            font-weight: 300;
            color: #7a6e62;
            letter-spacing: 1px;
            margin-left: auto;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.2rem;
        }
        .color-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.04), 0 2px 6px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            transition: transform 0.15s ease, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid #eae5de;
        }
        .color-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px rgba(0, 0, 0, 0.06);
            border-color: #cbc1b4;
        }
        .color-swatch {
            height: 100px;
            min-height: 80px;
            width: 100%;
            border-bottom: 1px solid rgba(0,0,0,0.04);
            background: #f0ede8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: rgba(0,0,0,0.25);
            letter-spacing: 0.3px;
            transition: background 0.1s;
            position: relative;
        }
        /* 浅色文字可读性优化 */
        .color-swatch.light-text {
            color: rgba(255,255,255,0.7);
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .color-swatch.dark-text {
            color: rgba(0,0,0,0.5);
            text-shadow: none;
        }
        .color-info {
            padding: 0.8rem 0.6rem 0.6rem;
            background: #ffffff;
            flex: 1;
        }
        .color-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: #2c2c2c;
            letter-spacing: 0.5px;
            margin-bottom: 0.2rem;
            line-height: 1.3;
            word-break: break-word;
        }
        .color-code {
            font-size: 0.7rem;
            font-weight: 400;
            color: #7e7368;
            background: #f0ece6;
            display: inline-block;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
            font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
            margin-top: 0.2rem;
        }
        .color-family-tag {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #8f857a;
            background: #ede8e0;
            padding: 0.1rem 0.6rem;
            border-radius: 30px;
            display: inline-block;
            margin-right: 0.3rem;
        }
        .footer-note {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #8f857a;
            text-align: right;
            border-top: 1px solid #ddd6cc;
            padding-top: 1.5rem;
            letter-spacing: 0.5px;
        }
        .footer-note span {
            background: #ede8e0;
            padding: 0.1rem 0.8rem;
            border-radius: 30px;
        }
        @media (max-width: 600px) {
            body { padding: 1rem; }
            h1 { font-size: 1.6rem; }
            .color-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 0.8rem; }
            .color-swatch { height: 80px; }
        }
    </style>
</head>

            const key = color.name + '|' + color.hex;
            if (!seen.has(key)) {
                seen.add(key);
                uniqueColors.push(color);
            }

        const grid = document.getElementById('colorGrid');
        if (!grid) return;

        // 预先判断深浅 (用于文字颜色)
        function isLightColor(hex) {
            const r = parseInt(hex.slice(1,3), 16);
            const g = parseInt(hex.slice(3,5), 16);
            const b = parseInt(hex.slice(5,7), 16);
            const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
            return luminance > 0.6;
        }

        let html = '';
        for (const color of uniqueColors) {
            const hex = color.hex.toUpperCase();
            const isLight = isLightColor(hex);
            const textClass = isLight ? 'dark-text' : 'light-text';

            html += `
                <div class="color-card">
                    <div class="color-swatch ${textClass}" style="background: ${hex};">
                        ${hex}
                    </div>
                    <div class="color-info">
                        <div class="color-name">${color.name}</div>
                        <span class="color-code">${hex}</span>
                    </div>
                </div>
            `;
        }
