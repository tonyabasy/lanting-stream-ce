# 通用错误码
10001=参数校验失败
10002=请求超时
20001=未登录或登录已过期
20002=无权限访问
50001=系统内部错误

# 用户模块 30101-30199
30101=用户不存在
30102=用户名已存在
30103=用户名或密码错误
30104=不能删除自己
30106=不允许操作超级管理员
30107=不允许操作受保护的用户名

# 集群模块 30201-30299
30201=集群不存在
30202=集群名称已存在
30204=不支持的部署目标
30205=Flink 版本检测失败，请检查 FLINK_HOME 是否正确

# 测试模块 99901-99999
99901=测试参数 {0} 和 {1}
