# Common result codes
10001=Invalid parameter
10002=Request timeout
20001=Unauthorized or session expired
20002=Access denied
50001=System internal error

# User module 30101-30199
30101=User not found
30102=Username already exists
30103=Invalid username or password
30104=Cannot delete yourself
30106=Operation on super admin is not allowed
30107=Operation on protected username is not allowed

# Cluster module 30201-30299
30201=Cluster not found
30202=Cluster name already exists
30204=Unsupported deployment target
30205=Flink version detection failed, please check FLINK_HOME

# Test module 99901-99999
99901=Test parameters {0} and {1}
