server:
  port: 8080

spring:
  main:
    banner-mode: off
  application:
    name: lanting-admin
  datasource:
    url: jdbc:sqlite:${LANTING_DATA_DIR:./.data}/lanting.db
    driver-class-name: org.sqlite.JDBC
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
    banner: false

sa-token:
  token-name: lanting-token
  timeout: 604800 # 7天
  is-concurrent: true
  is-share: true
  token-style: uuid
  jwt-secret-key: ${LANTING_JWT_SECRET:lanting-stream-ce-default-secret-key-2024}
  is-read-cookie: true
  is-read-header: true
  is-print: false


lanting:
  edition: community
  limits:
    max-users: 3
    max-clusters: 2
  data:
    dir: ${LANTING_DATA_DIR:./.data}
    workspace-dir: ${LANTING_DATA_DIR:./.data}/workspaces
    udf-dir: ${LANTING_DATA_DIR:./.data}/udfs

logging:
  level:
    com.lanting: INFO
